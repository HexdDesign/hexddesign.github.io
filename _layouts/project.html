{% if page.images %}
<div class="project-gallery">
  {% for image in page.images %}
  <div class="gallery-item">
    <img src="{{ image }}" alt="{{ page.title }}">
  </div>
  {% endfor %}
</div>
{% elsif page.cover %}
<div class="project-cover">
  <img src="{{ page.cover }}" alt="{{ page.title }}">
</div>
{% endif %}
